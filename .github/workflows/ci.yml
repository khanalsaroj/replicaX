name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Lowest privilege by default; nothing here needs write access.
permissions:
  contents: read

# A newer push to the same ref cancels in-flight runs for that ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test the engines floor (20) and current LTS (22).
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke-test the built CLI
        run: |
          node dist/index.js --version
          node dist/index.js --help

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Gate on the dependency tree that actually ships in `dist/`. Dev-only
      # advisories (e.g. esbuild's dev server via tsup — see README) are reported
      # for visibility but do not fail the build.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Audit all dependencies (informational)
        run: npm audit --audit-level=high || true
